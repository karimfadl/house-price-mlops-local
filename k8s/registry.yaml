# Local Docker registry — replaces AWS ECR.
# Runs as NodePort 30500, mapped by kind to localhost:15000 (see kind-cluster-config.yaml).
#
# CONFIRMED WORKING:
#   docker push localhost:15000/house-price-api:v1
#
# Inside the cluster, pods pull from:
#   registry.kube-system.svc.cluster.local:5000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: kube-system
  labels:
    app: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: kube-system
spec:
  selector:
    app: registry
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
