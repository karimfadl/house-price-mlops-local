# Kubernetes Job — generates the dataset and pushes it to MinIO.
# Runs once inside the cluster using cluster-internal DNS only.
#
# REGISTRY_HOST and IMAGE_TAG are replaced by sed:
#   sed "s/REGISTRY_HOST/registry.kube-system.svc.cluster.local:5000/g; s/IMAGE_TAG/v1/g" \
#     k8s/generate-data-job.yaml | kubectl apply -f -

apiVersion: batch/v1
kind: Job
metadata:
  name: generate-data
  namespace: house-price
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: generate-data
          image: REGISTRY_HOST/house-price-trainer:IMAGE_TAG
          command: ["python", "generate_data.py"]
          env:
            - name: MINIO_ENDPOINT
              value: http://minio.minio.svc.cluster.local:9000
            - name: MINIO_ACCESS_KEY
              value: minioadmin
            - name: MINIO_SECRET_KEY
              value: minioadmin
            - name: MINIO_BUCKET
              value: house-price-models
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
