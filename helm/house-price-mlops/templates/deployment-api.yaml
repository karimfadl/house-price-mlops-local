apiVersion: apps/v1
kind: Deployment
metadata:
  name: house-price-api
  namespace: {{ .Values.namespace }}
  labels:
    app: house-price-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: house-price-api
  template:
    metadata:
      labels:
        app: house-price-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.repository }}:{{ .Values.api.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MINIO_ENDPOINT
              value: {{ .Values.minio.endpoint }}
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.accessKey }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.secretKey }}
            - name: MINIO_BUCKET
              value: {{ .Values.minio.bucket }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: house-price-api
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: house-price-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
