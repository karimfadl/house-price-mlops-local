# The only file you edit to reconfigure the stack.
# Image repository uses cluster-internal DNS — pods pull from inside the cluster,
# while you push from your Mac using localhost:15000 (same registry, different address).

namespace: house-price

api:
  repository: $REGISTRY_IP:5000/house-price-api
  tag: v1
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

streamlit:
  repository: $REGISTRY_IP:5000/house-price-streamlit
  tag: v1
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

minio:
  endpoint:  http://minio.minio.svc.cluster.local:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket:    house-price-models

mlflow:
  trackingUri: http://mlflow.house-price.svc.cluster.local:5000
